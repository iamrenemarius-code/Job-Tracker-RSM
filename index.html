<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:'DM Sans',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}

@keyframes fadeSlideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.94) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes subtlePulse{0%,100%{box-shadow:0 0 0 0 rgba(99,102,241,0.15)}50%{box-shadow:0 0 0 6px rgba(99,102,241,0)}}

.fade-up{animation:fadeSlideUp 0.5s ease both}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}
.d5{animation-delay:.25s}.d6{animation-delay:.3s}.d7{animation-delay:.35s}.d8{animation-delay:.4s}.d9{animation-delay:.45s}

/* ── Header ── */
.header{padding:24px 28px 18px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;background:linear-gradient(180deg,rgba(99,102,241,0.04) 0%,transparent 100%)}
.header-left{display:flex;align-items:center;gap:12px}
.logo{width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,#6366f1,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.header h1{font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:#fff;line-height:1.2}
.subtitle{font-size:12px;color:rgba(255,255,255,0.35);font-weight:500}
.container{padding:22px 28px;max-width:1200px;margin:0 auto}

/* ── Buttons ── */
.btn-primary{padding:10px 22px;border-radius:12px;border:none;background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(99,102,241,0.3);transition:transform .15s,box-shadow .15s}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(99,102,241,0.4)}
.btn-secondary{padding:10px 20px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:rgba(255,255,255,0.5);font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.btn-secondary:hover{border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.7)}

/* ── Sync ── */
.sync-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:10px;font-size:12px;margin-bottom:16px;font-weight:500;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06)}
.sync-bar.connected{border-color:rgba(34,197,94,0.2)}.sync-bar.disconnected{border-color:rgba(245,158,11,0.2)}
.sync-dot{width:7px;height:7px;border-radius:50%}
.sync-dot.green{background:#22c55e;animation:subtlePulse 2s ease infinite}.sync-dot.amber{background:#f59e0b}
.sync-btn{margin-left:auto;padding:4px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.6);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .2s}
.sync-btn:hover{background:rgba(255,255,255,0.08);color:#fff}
.sync-spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.1);border-top-color:#6366f1;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}

/* ── Stat Cards ── */
.stats-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.stat-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:18px 20px;min-width:120px;flex:1;position:relative;overflow:hidden;transition:border-color .2s}
.stat-card:hover{border-color:rgba(255,255,255,0.1)}
.stat-card .accent{position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0}
.stat-card .value{font-size:30px;font-weight:700;font-family:'Fraunces',serif;line-height:1.1}
.stat-card .label{font-size:11px;color:rgba(255,255,255,0.4);margin-top:5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}

/* ── Panel ── */
.panel{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:22px;margin-bottom:14px;transition:border-color .2s}
.panel:hover{border-color:rgba(255,255,255,0.1)}
.panel-title{font-size:12px;font-weight:600;color:rgba(255,255,255,0.4);letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px}

/* ── Pipeline ── */
.pipeline-bar{display:flex;border-radius:10px;overflow:hidden;height:30px;gap:2px}
.pipeline-segment{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;transition:width .5s ease;cursor:default}
.pipeline-legend{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:12px}
.pipeline-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,0.45)}
.legend-dot{width:7px;height:7px;border-radius:50%;display:inline-block}

/* ── Charts ── */
.charts-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.chart-bars{display:flex;align-items:flex-end;gap:8px;height:90px}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.chart-val{font-size:11px;font-weight:600}.chart-bar{width:100%;max-width:34px;border-radius:6px;transition:height .5s ease}
.chart-label{font-size:9px;color:rgba(255,255,255,0.3);white-space:nowrap}

/* ── Controls ── */
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.input,.select{padding:9px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#fff;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
.input:focus,.select:focus{border-color:rgba(99,102,241,0.5)}
.select{cursor:pointer;appearance:none;padding-right:30px}
.select option{background:#1a1d23;color:#fff}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:rgba(255,255,255,0.25);pointer-events:none}
.search-wrap .input{width:100%;padding-left:36px}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.02em;white-space:nowrap;border:1.5px solid}
.badge-lg{padding:5px 13px;font-size:12.5px}
.badge-offer{color:#6aa84f;background:rgba(106,168,79,0.15);border-color:rgba(106,168,79,0.35)}
.badge-interviewing{color:#6d9eeb;background:rgba(109,158,235,0.15);border-color:rgba(109,158,235,0.35)}
.badge-initial{color:#b4a7d6;background:rgba(180,167,214,0.15);border-color:rgba(180,167,214,0.35)}
.badge-applied{color:#ffd966;background:rgba(255,217,102,0.18);border-color:rgba(255,217,102,0.4)}
.badge-decision{color:#a0aec0;background:rgba(160,174,192,0.12);border-color:rgba(160,174,192,0.3)}
.badge-wishlist{color:#94a3b8;background:rgba(148,163,184,0.08);border-color:rgba(148,163,184,0.2)}
.badge-rejected{color:#e06666;background:rgba(224,102,102,0.15);border-color:rgba(224,102,102,0.35)}

/* ── App Rows ── */
.app-list{display:flex;flex-direction:column;gap:7px}
.app-row{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;transition:background .2s,border-color .2s;cursor:pointer;border-left:3px solid}
.app-row:hover{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.1)}
.app-avatar{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;font-family:'Fraunces',serif;flex-shrink:0;border:1.5px solid}
.app-info{flex:1;min-width:170px}
.app-company{font-weight:600;font-size:15px;color:#fff;margin-bottom:1px}
.app-role{font-size:13px;color:rgba(255,255,255,0.42)}
.app-meta{font-size:12px;color:rgba(255,255,255,0.3);display:flex;gap:12px;margin-top:3px;flex-wrap:wrap}
.app-meta span{display:flex;align-items:center;gap:4px}
.app-salary{font-size:13px;font-weight:600;color:rgba(255,255,255,0.55);min-width:80px;text-align:right}
.app-date{font-size:12px;color:rgba(255,255,255,0.28);min-width:70px;text-align:right}
.app-delete{background:none;border:none;color:rgba(255,255,255,0.12);cursor:pointer;font-size:18px;padding:4px;border-radius:8px;transition:color .2s;line-height:1}
.app-delete:hover{color:#ef4444}
.empty-state{text-align:center;padding:56px 20px;color:rgba(255,255,255,0.22);font-size:14px}
.empty-state .icon{font-size:40px;margin-bottom:10px}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fadeIn .2s ease}
.modal{background:#1a1d23;border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:30px;width:92%;max-width:540px;animation:scaleIn .25s ease;max-height:90vh;overflow-y:auto}
.modal h2{font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:#fff;margin-bottom:22px}
.form-grid{display:flex;flex-direction:column;gap:14px}
.form-row{display:flex;gap:12px}.form-row>div{flex:1}
.form-label{font-size:11px;font-weight:600;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:block}
.form-input,.form-select,.form-textarea{width:100%;padding:9px 13px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#fff;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:rgba(99,102,241,0.5)}
.form-select option{background:#1a1d23;color:#fff}
.form-textarea{resize:vertical}
.form-actions{display:flex;gap:10px;margin-top:6px}.form-actions>button{flex:1}

/* ── Legend ── */
.legend-bar{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:14px 18px;margin-top:20px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center}

/* ── Star Rating ── */
.star-input{display:flex;gap:4px;padding:6px 0;cursor:pointer}
.star-input .star{font-size:22px;color:rgba(255,255,255,0.2);transition:color .15s;cursor:pointer;user-select:none}
.star-input .star.active{color:#ffd966}
.star-input .star:hover{color:#ffd966}
.star-display{color:#ffd966;font-size:13px;letter-spacing:1px;min-width:70px;text-align:right}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:2000;animation:fadeSlideUp .3s ease;pointer-events:none;font-family:'DM Sans',sans-serif}
.toast-success{background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);color:#22c55e}
.toast-error{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#ef4444}
.toast-info{background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);color:#818cf8}

/* ── Responsive ── */
@media(max-width:640px){
  .header{padding:18px 16px 14px}.container{padding:16px}.stats-row{gap:8px}
  .stat-card{min-width:0;padding:14px 16px}.stat-card .value{font-size:24px}
  .app-row{padding:12px 14px;gap:10px}.form-row{flex-direction:column;gap:14px}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header fade-up">
  <div class="header-left">
    <div class="logo">🎯</div>
    <div><h1>Job Tracker</h1><p class="subtitle" id="appCount">0 applications tracked</p></div>
  </div>
  <button class="btn-primary fade-up d1" onclick="openAdd()"><span style="font-size:18px;line-height:1">+</span> Add Application</button>
</div>

<div class="container">
  <div class="sync-bar fade-up d1" id="syncBar">
    <span class="sync-dot amber" id="syncDot"></span>
    <span id="syncText" style="color:rgba(255,255,255,0.5)">Checking connection…</span>
    <button class="sync-btn" onclick="syncFromSheet()">↻ Sync</button>
  </div>

  <div class="stats-row" id="statsRow"></div>
  <div id="pipelinePanel" class="fade-up d5"></div>
  <div class="charts-row" id="chartsRow"></div>

  <div class="controls fade-up d8">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="input" id="searchInput" placeholder="Search company, role, or location…" oninput="renderList()">
    </div>
    <select class="select" id="filterSelect" onchange="renderList()" style="min-width:145px"><option value="All">All Statuses</option></select>
    <select class="select" id="sortSelect" onchange="renderList()" style="min-width:125px">
      <option value="date">Sort: Date</option><option value="company">Sort: Company</option>
      <option value="status">Sort: Stage</option><option value="deadline">Sort: Deadline</option>
      <option value="score">Sort: Score</option>
    </select>
  </div>

  <div class="app-list" id="appList"></div>
  <div class="legend-bar fade-up d9" id="legendBar"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" style="display:none" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 id="modalTitle">New Application</h2>
    <div class="form-grid">
      <div class="form-row">
        <div><label class="form-label">Company *</label><input class="form-input" id="fCompany" placeholder="e.g. Crisis"></div>
        <div><label class="form-label">Location</label><input class="form-input" id="fLocation" placeholder="e.g. London (Hybrid)"></div>
      </div>
      <div><label class="form-label">Role *</label><input class="form-input" id="fRole" placeholder="e.g. Director of People & Culture"></div>
      <div class="form-row">
        <div><label class="form-label">Salary Range</label><input class="form-input" id="fSalary" placeholder="e.g. £80,000–£90,000"></div>
        <div><label class="form-label">Stage</label><select class="form-select" id="fStatus"></select></div>
      </div>
      <div class="form-row">
        <div><label class="form-label">Application Date</label><input class="form-input" id="fDate" type="date"></div>
        <div><label class="form-label">Deadline</label><input class="form-input" id="fDeadline" type="date"></div>
      </div>
      <div><label class="form-label">Job Link</label><input class="form-input" id="fLink" placeholder="https://…"></div>
      <div class="form-row">
        <div><label class="form-label">Contact</label><input class="form-input" id="fContact" placeholder="Recruiter name, hiring manager…"></div>
        <div><label class="form-label">Interest (1–5 stars)</label><div id="fScore" class="star-input" data-value="0">
          <span class="star" onclick="setStars(1)">☆</span><span class="star" onclick="setStars(2)">☆</span><span class="star" onclick="setStars(3)">☆</span><span class="star" onclick="setStars(4)">☆</span><span class="star" onclick="setStars(5)">☆</span>
        </div></div>
      </div>
      <div><label class="form-label">Positioning Notes</label><textarea class="form-textarea" id="fNotes" rows="3" placeholder="Key achievements to lead with, framing strategy, talking points…"></textarea></div>
      <div><label class="form-label">Feedback</label><textarea class="form-textarea" id="fFeedback" rows="2" placeholder="Interview feedback, rejection reasons…"></textarea></div>
      <div class="form-actions">
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" id="saveBtn" onclick="save()" style="justify-content:center">Add Application</button>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast" style="display:none"></div>

<script>
// ══════════════════════════════════════════
// ▼▼▼ PASTE YOUR GOOGLE APPS SCRIPT URL BELOW ▼▼▼
const APPS_SCRIPT_URL = "PASTE_URL_HERE";
// ▲▲▲ Looks like: https://script.google.com/macros/s/AKfycb.../exec ▲▲▲
// ══════════════════════════════════════════

const STATUS={
  "Offer":{color:"#6aa84f",bg:"rgba(106,168,79,0.15)",ring:"rgba(106,168,79,0.35)",icon:"🟢",badge:"badge-offer"},
  "Interviewing":{color:"#6d9eeb",bg:"rgba(109,158,235,0.15)",ring:"rgba(109,158,235,0.35)",icon:"🔵",badge:"badge-interviewing"},
  "Initial Screen":{color:"#b4a7d6",bg:"rgba(180,167,214,0.15)",ring:"rgba(180,167,214,0.35)",icon:"🟣",badge:"badge-initial"},
  "Decision needed":{color:"#a0aec0",bg:"rgba(160,174,192,0.12)",ring:"rgba(160,174,192,0.3)",icon:"⏳",badge:"badge-decision"},
  "Applied":{color:"#ffd966",bg:"rgba(255,217,102,0.18)",ring:"rgba(255,217,102,0.4)",icon:"🟡",badge:"badge-applied"},
  "Wishlist":{color:"#94a3b8",bg:"rgba(148,163,184,0.08)",ring:"rgba(148,163,184,0.2)",icon:"⚪",badge:"badge-wishlist"},
  "Rejected / Ghosted":{color:"#e06666",bg:"rgba(224,102,102,0.15)",ring:"rgba(224,102,102,0.35)",icon:"🔴",badge:"badge-rejected"},
};
const STATUSES=Object.keys(STATUS);
const PIPE_ORDER=["Wishlist","Applied","Initial Screen","Decision needed","Interviewing","Offer","Rejected / Ghosted"];

let apps=[];
let editId=null;

// ── INIT ──
(function(){
  const fSel=document.getElementById("filterSelect"),formSel=document.getElementById("fStatus");
  STATUSES.forEach(s=>{const c=STATUS[s];fSel.innerHTML+=`<option value="${s}">${c.icon} ${s}</option>`;formSel.innerHTML+=`<option value="${s}">${c.icon} ${s}</option>`});
  try{const saved=localStorage.getItem("jt_apps_v3");if(saved)apps=JSON.parse(saved)}catch(e){}
  renderAll();
  if(APPS_SCRIPT_URL&&APPS_SCRIPT_URL!=="PASTE_URL_HERE"){syncFromSheet()}
  else{setSyncStatus("disconnected","No Apps Script URL — using local storage")}
})();

// ── SYNC ──
async function syncFromSheet(){
  if(!APPS_SCRIPT_URL||APPS_SCRIPT_URL==="PASTE_URL_HERE"){setSyncStatus("disconnected","No Apps Script URL");return}
  setSyncStatus("syncing","Syncing with Google Sheets…");
  try{
    const res=await fetch(APPS_SCRIPT_URL);const json=await res.json();
    if(json.status==="ok"&&Array.isArray(json.data)){
      if(json.data.length>0){
        apps=json.data.map(r=>({
          id:String(r.id),company:r.company||"",role:r.role||"",location:r.location||"",
          salary_range:r.salary_range||"",job_link:r.job_link||"",
          application_date:r.application_date?String(r.application_date).slice(0,10):"",
          deadline:r.deadline?String(r.deadline).slice(0,10):"",
          stage:r.stage||r.status||"Applied",positioning_notes:r.positioning_notes||"",
          contact:r.contact||"",feedback:r.feedback||"",score:r.score||0,
        }));
      }
      saveLocal();renderAll();
      setSyncStatus("connected",`Connected — ${apps.length} application${apps.length!==1?'s':''} synced`);
    }else throw new Error("Bad response");
  }catch(e){console.error(e);setSyncStatus("disconnected","Could not reach Google Sheets — using local data")}
}

async function pushToSheet(action,data){
  if(!APPS_SCRIPT_URL||APPS_SCRIPT_URL==="PASTE_URL_HERE")return;
  try{await fetch(APPS_SCRIPT_URL,{method:"POST",redirect:"follow",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action,...data})})}catch(e){console.warn("Push failed:",e)}
}

function setSyncStatus(state,text){
  const dot=document.getElementById("syncDot"),txt=document.getElementById("syncText"),bar=document.getElementById("syncBar");
  bar.className="sync-bar fade-up d1 "+(state==="connected"?"connected":"disconnected");
  const prev=dot.parentElement.querySelector(".sync-spinner");if(prev)prev.remove();
  if(state==="syncing"){dot.style.display="none";const sp=document.createElement("span");sp.className="sync-spinner";dot.insertAdjacentElement("afterend",sp)}
  else{dot.style.display="";dot.className="sync-dot "+(state==="connected"?"green":"amber")}
  txt.textContent=text;
}

function saveLocal(){try{localStorage.setItem("jt_apps_v3",JSON.stringify(apps))}catch(e){}}

// ── TOAST ──
function toast(msg,type="success"){const el=document.getElementById("toast");el.textContent=msg;el.className="toast toast-"+type;el.style.display="block";setTimeout(()=>el.style.display="none",2500)}

// ── MODAL ──
function openAdd(){
  editId=null;
  document.getElementById("modalTitle").textContent="New Application";
  document.getElementById("saveBtn").textContent="Add Application";
  ["fCompany","fRole","fLocation","fSalary","fLink","fContact","fNotes","fFeedback"].forEach(id=>document.getElementById(id).value="");
  setStars(0);
  document.getElementById("fStatus").value="Applied";
  document.getElementById("fDate").value=new Date().toISOString().slice(0,10);
  document.getElementById("fDeadline").value="";
  document.getElementById("overlay").style.display="flex";
}

function openEdit(id){
  const a=apps.find(x=>String(x.id)===String(id));if(!a)return;
  editId=a.id;
  document.getElementById("modalTitle").textContent="Edit Application";
  document.getElementById("saveBtn").textContent="Update";
  document.getElementById("fCompany").value=a.company;
  document.getElementById("fRole").value=a.role;
  document.getElementById("fLocation").value=a.location||"";
  document.getElementById("fSalary").value=a.salary_range||"";
  document.getElementById("fStatus").value=a.stage;
  document.getElementById("fDate").value=a.application_date||"";
  document.getElementById("fDeadline").value=a.deadline||"";
  document.getElementById("fLink").value=a.job_link||"";
  document.getElementById("fContact").value=a.contact||"";
  document.getElementById("fNotes").value=a.positioning_notes||"";
  document.getElementById("fFeedback").value=a.feedback||"";
  setStars(a.score||0);
  document.getElementById("overlay").style.display="flex";
}

function closeModal(){document.getElementById("overlay").style.display="none"}

function save(){
  const company=document.getElementById("fCompany").value.trim();
  const role=document.getElementById("fRole").value.trim();
  if(!company||!role){toast("Company and Role are required","error");return}
  const data={
    company,role,
    location:document.getElementById("fLocation").value.trim(),
    salary_range:document.getElementById("fSalary").value.trim(),
    stage:document.getElementById("fStatus").value,
    application_date:document.getElementById("fDate").value,
    deadline:document.getElementById("fDeadline").value,
    job_link:document.getElementById("fLink").value.trim(),
    contact:document.getElementById("fContact").value.trim(),
    positioning_notes:document.getElementById("fNotes").value.trim(),
    feedback:document.getElementById("fFeedback").value.trim(),
    score:getStars(),
  };
  if(editId){
    apps=apps.map(a=>String(a.id)===String(editId)?{...a,...data}:a);
    pushToSheet("update",{data:{id:editId,...data}});toast("Application updated");
  }else{
    const newApp={id:String(Date.now()),...data};apps.push(newApp);
    pushToSheet("add",{data:newApp});toast("Application added");
  }
  saveLocal();renderAll();closeModal();
}

function remove(id,e){
  e.stopPropagation();apps=apps.filter(a=>String(a.id)!==String(id));
  pushToSheet("delete",{id:String(id)});saveLocal();renderAll();toast("Removed","info");
}

// ── RENDER ──
function renderAll(){
  document.getElementById("appCount").textContent=`${apps.length} application${apps.length!==1?'s':''} tracked`;
  renderStats();renderPipeline();renderCharts();renderList();renderLegend();
}

function renderStats(){
  const counts={};STATUSES.forEach(s=>counts[s]=apps.filter(a=>a.stage===s).length);
  const active=apps.filter(a=>!["Wishlist","Rejected / Ghosted"].includes(a.stage)).length;
  const upcoming=apps.filter(a=>{if(!a.deadline)return false;const d=new Date(a.deadline);const now=new Date();const week=new Date();week.setDate(now.getDate()+7);return d>=now&&d<=week}).length;
  const cards=[
    {label:"Total",value:apps.length,color:"#6366f1",d:2},
    {label:"Active",value:active,color:"#3b82f6",d:3},
    {label:"Interviews",value:counts["Interviewing"],color:"#6d9eeb",d:4},
    {label:"Offers",value:counts["Offer"],color:"#6aa84f",d:5},
    {label:"Deadlines This Week",value:upcoming,color:"#a855f7",d:5},
  ];
  document.getElementById("statsRow").innerHTML=cards.map(c=>
    `<div class="stat-card fade-up d${c.d}"><div class="accent" style="background:linear-gradient(90deg,${c.color},transparent)"></div><div class="value" style="color:${c.color}">${c.value}</div><div class="label">${c.label}</div></div>`
  ).join("");
}

function renderPipeline(){
  const counts={};STATUSES.forEach(s=>counts[s]=0);apps.forEach(a=>counts[a.stage]++);const total=apps.length||1;
  const segs=PIPE_ORDER.map(s=>{const p=(counts[s]/total)*100;if(!p)return"";const c=STATUS[s];const txtC=["Wishlist","Applied","Initial Screen"].includes(s)?"#1e293b":"#fff";return`<div class="pipeline-segment" style="width:${p}%;background:${c.color};min-width:${p>0?24:0}px;color:${txtC}" title="${s}: ${counts[s]}">${counts[s]}</div>`}).join("");
  const leg=PIPE_ORDER.map(s=>`<span class="pipeline-legend-item"><span class="legend-dot" style="background:${STATUS[s].color}"></span>${s} (${counts[s]})</span>`).join("");
  document.getElementById("pipelinePanel").innerHTML=`<div class="panel"><div class="panel-title">Pipeline Overview</div><div class="pipeline-bar">${segs}</div><div class="pipeline-legend">${leg}</div></div>`;
}

function renderCharts(){
  const now=new Date();const weeks=[];
  for(let i=5;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i*7);const ws=new Date(d);ws.setDate(ws.getDate()-ws.getDay());weeks.push(ws)}
  const wC=weeks.map(ws=>{const we=new Date(ws);we.setDate(we.getDate()+7);return apps.filter(a=>{const ad=new Date(a.application_date);return ad>=ws&&ad<we}).length});
  const wM=Math.max(...wC,1);const wL=weeks.map(w=>w.toLocaleDateString("en-GB",{day:"numeric",month:"short"}));
  const bars=wC.map((c,i)=>`<div class="chart-col"><span class="chart-val" style="color:${c>0?'#3b82f6':'rgba(255,255,255,0.15)'}">${c}</span><div class="chart-bar" style="height:${Math.max((c/wM)*75,4)}px;background:${c>0?'linear-gradient(180deg,#3b82f6,#6366f1)':'rgba(255,255,255,0.04)'}"></div><span class="chart-label">${wL[i]}</span></div>`).join("");

  const total=apps.length||1;const active=apps.filter(a=>!["Wishlist","Rejected / Ghosted"].includes(a.stage)).length;
  const pct=Math.round((active/total)*100);const r=50,circ=2*Math.PI*r,offset=circ-(pct/100)*circ;

  document.getElementById("chartsRow").innerHTML=
    `<div class="panel fade-up d6" style="flex:1;min-width:260px"><div class="panel-title">Weekly Activity</div><div class="chart-bars">${bars}</div></div>
    <div class="panel fade-up d7" style="display:flex;flex-direction:column;align-items:center;min-width:185px">
      <div class="panel-title" style="align-self:flex-start">Active Rate</div>
      <svg width="120" height="120" viewBox="0 0 120 120" style="margin-top:4px">
        <circle cx="60" cy="60" r="${r}" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="9"/>
        <circle cx="60" cy="60" r="${r}" fill="none" stroke="url(#rG)" stroke-width="9" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" transform="rotate(-90 60 60)" style="transition:stroke-dashoffset 1s ease"/>
        <defs><linearGradient id="rG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#6aa84f"/><stop offset="100%" stop-color="#6d9eeb"/></linearGradient></defs>
        <text x="60" y="56" text-anchor="middle" fill="white" font-size="26" font-weight="700" font-family="'Fraunces',serif">${pct}%</text>
        <text x="60" y="74" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="10" font-weight="500">active</text>
      </svg>
    </div>`;
}

function renderList(){
  const q=document.getElementById("searchInput").value.toLowerCase();
  const f=document.getElementById("filterSelect").value;
  const s=document.getElementById("sortSelect").value;
  let list=apps.filter(a=>f==="All"||a.stage===f)
    .filter(a=>a.company.toLowerCase().includes(q)||a.role.toLowerCase().includes(q)||(a.location||"").toLowerCase().includes(q));
  list.sort((a,b)=>{
    if(s==="date")return new Date(b.application_date||0)-new Date(a.application_date||0);
    if(s==="company")return a.company.localeCompare(b.company);
    if(s==="deadline"){if(!a.deadline&&!b.deadline)return 0;if(!a.deadline)return 1;if(!b.deadline)return-1;return new Date(a.deadline)-new Date(b.deadline)}
    if(s==="score")return(b.score||0)-(a.score||0);
    return STATUSES.indexOf(a.stage)-STATUSES.indexOf(b.stage);
  });

  if(!list.length){document.getElementById("appList").innerHTML=`<div class="empty-state"><div class="icon">📭</div>No applications match your filters</div>`;return}

  document.getElementById("appList").innerHTML=list.map((a,i)=>{
    const c=STATUS[a.stage]||STATUS["Applied"];
    const dt=a.application_date?new Date(a.application_date).toLocaleDateString("en-GB",{day:"numeric",month:"short"}):"";
    const dl=a.deadline?new Date(a.deadline).toLocaleDateString("en-GB",{day:"numeric",month:"short"}):"";
    const metaParts=[];
    if(a.location)metaParts.push(`<span>📍 ${esc(a.location)}</span>`);
    if(dl)metaParts.push(`<span>⏰ ${dl}</span>`);
    if(a.contact)metaParts.push(`<span>👤 ${esc(a.contact)}</span>`);
    return`<div class="app-row fade-up" style="border-left-color:${c.color};animation-delay:${0.03*i}s" onclick="openEdit('${a.id}')">
      <div class="app-avatar" style="background:${c.bg};border-color:${c.ring};color:${c.color}">${a.company.charAt(0)}</div>
      <div class="app-info">
        <div class="app-company">${esc(a.company)}</div>
        <div class="app-role">${esc(a.role)}</div>
        ${metaParts.length?`<div class="app-meta">${metaParts.join("")}</div>`:""}
      </div>
      <span class="badge ${c.badge}"><span style="font-size:10px">${c.icon}</span> ${esc(a.stage)}</span>
      ${a.salary_range?`<div class="app-salary">${esc(a.salary_range)}</div>`:""}
      <div class="star-display">${starsHTML(a.score||0)}</div>
      <div class="app-date">${dt}</div>
      <button class="app-delete" onclick="remove('${a.id}',event)" title="Remove">×</button>
    </div>`}).join("");
}

function renderLegend(){
  document.getElementById("legendBar").innerHTML=STATUSES.map(s=>{const c=STATUS[s];return`<span class="badge badge-lg ${c.badge}"><span style="font-size:11px">${c.icon}</span> ${s}</span>`}).join("");
}

function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}

function setStars(n){
  const el=document.getElementById("fScore");el.dataset.value=n;
  el.querySelectorAll(".star").forEach((s,i)=>{s.textContent=i<n?"★":"☆";s.classList.toggle("active",i<n)});
}
function getStars(){return parseInt(document.getElementById("fScore").dataset.value)||0}
function starsHTML(n){let s="";for(let i=0;i<5;i++)s+=i<n?"★":"☆";return s}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();if(e.key==="n"&&(e.ctrlKey||e.metaKey)){e.preventDefault();openAdd()}});
</script>
</body>
</html>
